name: Manual Agent Trigger

on:
  workflow_dispatch:
    inputs:
      meeting_title:
        description: 'Meeting title to generate SbS for'
        required: false
        default: ''

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Run agent
      run: |
        if [ -z "${{ github.event.inputs.meeting_title }}" ]; then
          python src/main.py --manual-trigger
        else
          python src/main.py --generate-sbs "${{ github.event.inputs.meeting_title }}"
        fi
    
    - name: Upload SbS output
      uses: actions/upload-artifact@v4
      with:
        name: sbs-output
        path: outputs/